<!DOCTYPE html>
<html lang="es">
<head>
  <script>(function(){var p=location.pathname;var d=p.endsWith('/')?p:(p.split('/').length>2?p.replace(/\/[^\/]*$/,'/') : p+'/');document.write('<base href="'+location.origin+d+'">');})();</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Detalle de producto — Verde Vivo">
  <title>Producto | Verde Vivo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="organic-blobs" aria-hidden="true">
    <div class="organic-blob organic-blob--1"></div>
    <div class="organic-blob organic-blob--2"></div>
  </div>

  <header class="organic-header" id="header">
    <div class="organic-header__inner">
      <a href="index.html" class="organic-logo">Verde Vivo</a>
      <button class="organic-burger" id="navToggle" aria-label="Abrir menú">
        <span></span><span></span><span></span>
      </button>
      <nav class="organic-nav" id="nav">
        <a href="index.html">Inicio</a>
        <a href="products.html">Productos</a>
        <a href="about.html">Nosotros</a>
        <a href="contact.html">Contacto</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="organic-detail">
      <div class="organic-container">
        <a href="products.html" class="organic-back organic-reveal">← Productos</a>
        <div class="organic-detail__grid">
          <div class="organic-detail__img organic-reveal">
            <img id="productImage" src="https://images.unsplash.com/photo-1596755389378-c31d21fd1273?w=600&q=80" alt="">
          </div>
          <div class="organic-detail__info">
            <h1 id="productTitle" class="organic-reveal">Producto</h1>
            <p id="productMeta" class="organic-detail-meta organic-reveal">—</p>
            <div id="productDescription" class="organic-detail-desc organic-reveal"></div>
            <p class="organic-cta-wrap"><a href="contact.html" class="organic-btn">Consultar / Pedir</a></p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="organic-footer">
    <div class="organic-footer__inner">
      <span class="organic-logo">Verde Vivo</span>
      <p><a href="mailto:hola@verdevivo.com">hola@verdevivo.com</a> · <a href="tel:+59899887766">+598 99 887 766</a></p>
      <p class="organic-footer__copy">© 2025 Verde Vivo</p>
    </div>
  </footer>

  <script src="js/products-data.js"></script>
  <script src="js/main.js"></script>
  <script>
    (function() {
      if (!window.PRODUCTS_DATA) return;
      var params = new URLSearchParams(window.location.search);
      var id = parseInt(params.get('id'), 10) || 1;
      var product = window.PRODUCTS_DATA[id];
      if (!product) product = window.PRODUCTS_DATA[1];
      var img = document.getElementById('productImage');
      var title = document.getElementById('productTitle');
      var meta = document.getElementById('productMeta');
      var desc = document.getElementById('productDescription');
      if (img) { img.src = product.image; img.alt = product.name; }
      if (title) title.textContent = product.name;
      if (meta) meta.textContent = product.volume || '';
      if (desc) desc.innerHTML = '<p>' + product.description + '</p>' + (product.ingredients ? '<p><strong>Ingredientes:</strong> ' + product.ingredients + '</p>' : '');
      document.title = product.name + ' | Verde Vivo';
    })();
  </script>
</body>
</html>
