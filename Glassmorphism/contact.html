<!DOCTYPE html>
<html lang="es">
<head>
  <script>(function(){var p=location.pathname;var d=p.endsWith('/')?p:(p.split('/').length>2?p.replace(/\/[^\/]*$/,'/') : p+'/');document.write('<base href="'+location.origin+d+'">');})();</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contacto — Flow.">
  <title>Contacto | Flow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="glass-bg"></div>

  <header class="glass-header" id="header">
    <div class="glass-header__inner">
      <a href="index.html" class="glass-logo">Flow</a>
      <button class="glass-burger" id="navToggle" aria-label="Abrir menú">
        <span></span><span></span><span></span>
      </button>
      <nav class="glass-nav" id="nav">
        <a href="index.html">Inicio</a>
        <a href="features.html">Funciones</a>
        <a href="about.html">Nosotros</a>
        <a href="contact.html">Contacto</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="glass-page-hero">
      <div class="glass-container">
        <h1 class="glass-page-hero__title">Contacto</h1>
        <p class="glass-page-hero__lead">¿Dudas, demo o plan empresarial? Escribinos y te respondemos en menos de 24 h.</p>
      </div>
    </section>

    <section class="glass-section">
      <div class="glass-container">
        <div class="glass-contact-wrap">
          <form class="glass-form" id="contactForm" action="#" method="post">
            <label for="name">Nombre</label>
            <input type="text" id="name" name="name" required placeholder="Tu nombre">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="tu@email.com">
            <label for="message">Mensaje</label>
            <textarea id="message" name="message" required placeholder="Tu consulta..."></textarea>
            <button type="submit" class="glass-btn glass-btn--primary">Enviar</button>
          </form>
          <div class="glass-contact-datos">
            <p><a href="mailto:hola@flow.app">hola@flow.app</a></p>
            <p><a href="tel:+59899111222">+598 99 111 222</a></p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="glass-footer">
    <div class="glass-footer__inner">
      <span class="glass-logo">Flow</span>
      <p><a href="mailto:hola@flow.app">hola@flow.app</a> · <a href="tel:+59899111222">+598 99 111 222</a></p>
      <p class="glass-footer__copy">© 2025 Flow</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
