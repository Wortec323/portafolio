<!DOCTYPE html>
<html lang="es">
<head>
  <script>(function(){var p=location.pathname;var d=p.endsWith('/')?p:(p.split('/').length>2?p.replace(/\/[^\/]*$/,'/') : p+'/');document.write('<base href="'+location.origin+d+'">');})();</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Entradas — ARCADE NIGHT.">
  <title>Entradas | ARCADE NIGHT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="retro-scanlines" aria-hidden="true"></div>
  <div class="retro-shapes" aria-hidden="true"></div>

  <header class="retro-header" id="header">
    <div class="retro-header__inner">
      <a href="index.html" class="retro-logo">ARCADE NIGHT</a>
      <button class="retro-burger" id="navToggle" aria-label="Abrir menú">
        <span></span><span></span><span></span>
      </button>
      <nav class="retro-nav" id="nav">
        <a href="index.html">Inicio</a>
        <a href="games.html">Juegos</a>
        <a href="about.html">El evento</a>
        <a href="contact.html">Entradas</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="retro-page-hero">
      <div class="retro-container">
        <h1 class="retro-page-hero__title retro-glitch-hover">ENTRADAS</h1>
        <p class="retro-page-hero__lead">Anticipadas 15 € · En puerta 20 €. Incluye monedas para las máquinas.</p>
      </div>
    </section>

    <section class="retro-section">
      <div class="retro-container">
        <div class="retro-contact-wrap">
          <form class="retro-form" id="contactForm" action="#" method="post">
            <label for="name">Nombre</label>
            <input type="text" id="name" name="name" required>
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
            <label for="qty">Cantidad de entradas</label>
            <input type="number" id="qty" name="qty" min="1" max="10" value="1">
            <button type="submit" class="retro-btn">RESERVAR</button>
          </form>
          <div class="retro-contact-datos">
            <p>entradas@arcadenight.com</p>
            <p>+598 99 555 666</p>
            <p>Warehouse 88 — Zona portuaria</p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="retro-footer">
    <div class="retro-footer__inner">
      <span class="retro-logo">ARCADE NIGHT</span>
      <p>entradas@arcadenight.com · +598 99 555 666</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
