<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Detalle del proyecto de arquitectura del estudio.">
  <title>Proyecto | Estudio Arquitectura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header" id="header">
    <div class="container">
      <a href="index.html" class="logo">ESTUDIO</a>
      <button class="nav-toggle" id="navToggle" aria-label="Abrir menú">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav class="nav" id="nav">
        <ul>
          <li><a href="index.html">Inicio</a></li>
          <li><a href="projects.html">Proyectos</a></li>
          <li><a href="about.html">Nosotros</a></li>
          <li><a href="contact.html">Contacto</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="project-detail">
    <section class="hero" id="projectHero">
      <div class="hero__image">
        <img id="projectHeroImage" src="https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?w=1920&q=80" alt="">
      </div>
      <div class="hero__content container">
        <a href="projects.html" class="back-link">← Volver a proyectos</a>
        <h1 id="projectTitle">Carga del proyecto…</h1>
        <p class="project-meta" id="projectMeta">—</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="project-gallery" id="projectGallery"></div>
        <div class="project-description" id="projectDescription"></div>
        <p class="text-center mb-0">
          <a href="projects.html" class="btn btn--light">Ver todos los proyectos</a>
        </p>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <a href="index.html" class="logo">ESTUDIO</a>
      <nav class="footer-nav">
        <ul>
          <li><a href="index.html">Inicio</a></li>
          <li><a href="projects.html">Proyectos</a></li>
          <li><a href="about.html">Nosotros</a></li>
          <li><a href="contact.html">Contacto</a></li>
        </ul>
      </nav>
      <p class="footer-copy">© 2025 Estudio Arquitectura. Todos los derechos reservados.</p>
    </div>
  </footer>

  <script src="js/projects-data.js"></script>
  <script src="js/main.js"></script>
  <script>
    (function() {
      if (!window.PROJECTS_DATA) return;
      var params = new URLSearchParams(window.location.search);
      var id = parseInt(params.get('id'), 10) || 1;
      var project = window.PROJECTS_DATA[id];
      if (!project) project = window.PROJECTS_DATA[1];
      var heroImg = document.getElementById('projectHeroImage');
      var title = document.getElementById('projectTitle');
      var meta = document.getElementById('projectMeta');
      var gallery = document.getElementById('projectGallery');
      var description = document.getElementById('projectDescription');
      if (heroImg) heroImg.src = project.heroImage;
      if (heroImg) heroImg.alt = project.name;
      if (title) title.textContent = project.name;
      if (meta) meta.textContent = project.location + ' · ' + project.year;
      if (gallery && project.gallery && project.gallery.length) {
        gallery.innerHTML = project.gallery.map(function(url) {
          return '<img src="' + url + '" alt="' + project.name + '">';
        }).join('');
      }
      if (description) {
        description.innerHTML = '<h2>El proyecto</h2><p>' + project.description + '</p>' +
          (project.description2 ? '<p>' + project.description2 + '</p>' : '');
      }
      document.title = project.name + ' | Estudio Arquitectura';
    })();
  </script>
</body>
</html>
