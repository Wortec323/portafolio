<!DOCTYPE html>
<html lang="es">
<head>
  <script>(function(){var p=location.pathname;var d=p.endsWith('/')?p:(p.split('/').length>2?p.replace(/\/[^\/]*$/,'/') : p+'/');document.write('<base href="'+location.origin+d+'">');})();</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contacto — BRUTAL.">
  <title>Contacto | BRUTAL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="bru-header" id="header">
    <div class="bru-header__inner">
      <a href="index.html" class="bru-logo">BRUTAL</a>
      <button class="bru-burger" id="navToggle" aria-label="Abrir menú">
        <span></span><span></span><span></span>
      </button>
      <nav class="bru-nav" id="nav">
        <a href="index.html">Inicio</a>
        <a href="projects.html">Proyectos</a>
        <a href="about.html">Nosotros</a>
        <a href="contact.html">Contacto</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="bru-page-hero bru-section--black">
      <div class="bru-container">
        <h1 class="bru-page-title bru-reveal-in">CONTACTO</h1>
        <p class="bru-large bru-reveal-in">Escribinos. Sin rodeos.</p>
      </div>
    </section>

    <section class="bru-section bru-section--white">
      <div class="bru-container">
        <div class="bru-contact-wrap">
          <form class="bru-form" id="contactForm" action="#" method="post">
            <label for="name">Nombre</label>
            <input type="text" id="name" name="name" required>
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
            <label for="message">Mensaje</label>
            <textarea id="message" name="message" required></textarea>
            <button type="submit" class="bru-btn">Enviar</button>
          </form>
          <div class="bru-contact-datos">
            <p>hola@brutal.studio</p>
            <p>+598 99 000 000</p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="bru-footer">
    <div class="bru-footer__inner">
      <span class="bru-logo">BRUTAL</span>
      <span>Proyectos · Nosotros · Contacto</span>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
