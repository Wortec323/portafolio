<!DOCTYPE html>
<html lang="es">
<head>
  <script>(function(){var p=location.pathname;var d=p.endsWith('/')?p:(p.split('/').length>2?p.replace(/\/[^\/]*$/,'/') : p+'/');document.write('<base href="'+location.origin+d+'">');})();</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Detalle de proyecto — BRUTAL">
  <title>Proyecto | BRUTAL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="bru-header" id="header">
    <div class="bru-header__inner">
      <a href="index.html" class="bru-logo">BRUTAL</a>
      <button class="bru-burger" id="navToggle" aria-label="Abrir menú">
        <span></span><span></span><span></span>
      </button>
      <nav class="bru-nav" id="nav">
        <a href="index.html">Inicio</a>
        <a href="projects.html">Proyectos</a>
        <a href="about.html">Nosotros</a>
        <a href="contact.html">Contacto</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="bru-detail-hero bru-section--black">
      <div class="bru-detail-hero__bg" id="detailHeroBg"></div>
      <div class="bru-container bru-detail-hero__content">
        <a href="projects.html" class="bru-back bru-reveal-in">← Proyectos</a>
        <h1 id="projectTitle" class="bru-reveal-in">Proyecto</h1>
        <p class="bru-detail-meta" id="projectMeta">—</p>
      </div>
    </section>

    <section class="bru-section bru-section--white">
      <div class="bru-container">
        <div class="bru-detail-gallery" id="projectGallery"></div>
        <div class="bru-detail-desc bru-reveal-in" id="projectDescription"></div>
        <p class="bru-cta"><a href="projects.html" class="bru-link">Ver proyectos</a></p>
      </div>
    </section>
  </main>

  <footer class="bru-footer">
    <div class="bru-footer__inner">
      <span class="bru-logo">BRUTAL</span>
      <span>Proyectos · Nosotros · Contacto</span>
    </div>
  </footer>

  <script src="js/projects-data.js"></script>
  <script src="js/main.js"></script>
  <script>
    (function() {
      if (!window.PROJECTS_DATA) return;
      var params = new URLSearchParams(window.location.search);
      var id = parseInt(params.get('id'), 10) || 1;
      var project = window.PROJECTS_DATA[id];
      if (!project) project = window.PROJECTS_DATA[1];
      var bg = document.getElementById('detailHeroBg');
      var title = document.getElementById('projectTitle');
      var meta = document.getElementById('projectMeta');
      var gallery = document.getElementById('projectGallery');
      var description = document.getElementById('projectDescription');
      if (bg && project.heroImage) {
        bg.style.backgroundImage = 'url(' + project.heroImage + ')';
      }
      if (title) title.textContent = project.name;
      if (meta) meta.textContent = project.client + ' · ' + project.year;
      if (gallery && project.gallery && project.gallery.length) {
        gallery.innerHTML = project.gallery.map(function(url) {
          return '<img src="' + url + '" alt="' + project.name + '">';
        }).join('');
      }
      if (description) {
        description.innerHTML = '<h2>El proyecto</h2><p>' + project.description + '</p>' +
          (project.description2 ? '<p>' + project.description2 + '</p>' : '');
      }
      document.title = project.name + ' | BRUTAL';
    })();
  </script>
</body>
</html>
